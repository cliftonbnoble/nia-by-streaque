<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Streaque · Homepage Wireframes</title>
  <link rel="stylesheet" href="wireframes.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #2a2823; font-family: 'Kalam', cursive; color: #e9e2d2; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="wf-atoms.jsx"></script>
  <script type="text/babel" src="dir-a.jsx"></script>
  <script type="text/babel" src="dir-b.jsx"></script>
  <script type="text/babel" src="dir-c.jsx"></script>
  <script type="text/babel" src="dir-d.jsx"></script>
  <script type="text/babel" src="dir-bplus.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ARTBOARD_W = 980;
    const ARTBOARD_H = 1900;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "fidelity": "sketch",
      "showAccent": true,
      "showAnnotations": true
    }/*EDITMODE-END*/;

    function Frame({ children, fidelity, showAccent, showAnnos }) {
      const cls = ['wf'];
      if (fidelity === 'clean') cls.push('clean');
      if (!showAccent) cls.push('no-accent');
      if (!showAnnos) cls.push('no-annos');
      return (
        <div className={cls.join(' ')} style={{ width: ARTBOARD_W, height: ARTBOARD_H, position: 'relative', overflow: 'hidden' }}>
          {children}
        </div>
      );
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const { fidelity, showAccent, showAnnotations } = tweaks;

      const wrap = (Comp) => (
        <Frame fidelity={fidelity} showAccent={showAccent} showAnnos={showAnnotations}>
          <Comp />
        </Frame>
      );

      return (
        <>
          <DesignCanvas
            title="Streaque · Nia — Homepage wireframes"
            subtitle="Four directions + a recommended synthesis (B+). Drag to pan, scroll to zoom, click any artboard to focus."
          >
            <DCSection
              id="recommended"
              title="Recommended synthesis"
              subtitle="B's product chassis + C's trust grafts + D's stat treatment. The one to push to mid-fi."
            >
              <DCArtboard id="dir-bplus" label="B+ · Recommended" width={ARTBOARD_W} height={ARTBOARD_H}>
                {wrap(DirBPlus)}
              </DCArtboard>
            </DCSection>
            <DCSection
              id="homepage"
              title="Original four directions"
              subtitle="Each artboard is one complete homepage. Scroll inside to see all sections."
            >
              <DCArtboard id="dir-a" label="A · Editorial / Investor-led" width={ARTBOARD_W} height={ARTBOARD_H}>
                {wrap(DirA)}
              </DCArtboard>
              <DCArtboard id="dir-b" label="B · Product-demo-led" width={ARTBOARD_W} height={ARTBOARD_H}>
                {wrap(DirB)}
              </DCArtboard>
              <DCArtboard id="dir-c" label="C · Trust / Compliance-led" width={ARTBOARD_W} height={ARTBOARD_H}>
                {wrap(DirC)}
              </DCArtboard>
              <DCArtboard id="dir-d" label="D · Conversation-as-hero" width={ARTBOARD_W} height={ARTBOARD_H}>
                {wrap(DirD)}
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks" defaultOpen={false}>
            <TweakSection label="Fidelity">
              <TweakRadio
                value={fidelity}
                onChange={(v) => setTweak('fidelity', v)}
                options={[
                  { value: 'sketch', label: 'Sketchy' },
                  { value: 'clean', label: 'Cleaner' },
                ]}
              />
            </TweakSection>
            <TweakSection label="Display">
              <TweakToggle
                label="Accent color"
                value={showAccent}
                onChange={(v) => setTweak('showAccent', v)}
              />
              <TweakToggle
                label="Annotations"
                value={showAnnotations}
                onChange={(v) => setTweak('showAnnotations', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
